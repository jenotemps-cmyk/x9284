# Make sure you're in your project root (where server.js is)
cd /path/to/your/project

# Create a simple test index.html
cat > index.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
    <title>Perc Config - Test</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #0a0a0a; color: white; }
        .success { color: #10b981; font-size: 24px; }
        button { background: #6726f0; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🎉 RAILWAY IS WORKING! 🎉</h1>
    <p class="success">✓ Your server is running</p>
    <p>✓ Static files are being served</p>
    <p>✓ Node.js is working</p>
    <button onclick="testAPI()">Test API</button>
    <p id="result"></p>

    <script>
        async function testAPI() {
            const res = await fetch('/test');
            const data = await res.json();
            document.getElementById('result').innerHTML = '<code>' + JSON.stringify(data) + '</code>';
        }
    </script>
</body>
</html>
EOF
